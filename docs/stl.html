<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STL Visualizer Hub | Data Structure Learning Platform</title>
    <link rel="stylesheet" href="stl.css">
</head>
<body>
    <main class="page">
        <nav class="top-nav" aria-label="Main navigation">
            <a href="index.html">← Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="adt-visualizer.html">Code Visualizer</a>
        </nav>

        <header class="hero">
            <p class="eyebrow">STL Visualizer Hub</p>
            <h1>자료구조를 선택하고 바로 시각화하세요</h1>
            <p class="hero-description">
                Stack, Queue, Array, Linked List, Tree의 핵심 개념과 주요 연산을 먼저 확인한 뒤
                각 시각화 페이지로 이동할 수 있습니다.
            </p>
        </header>

        <section class="hub-layout">
            <aside class="structure-list" aria-label="자료구조 선택 목록">
                <button class="structure-card active" type="button" data-key="stack">
                    <span class="structure-name">Stack</span>
                    <span class="structure-summary">LIFO · push / pop</span>
                </button>
                <button class="structure-card" type="button" data-key="queue">
                    <span class="structure-name">Queue</span>
                    <span class="structure-summary">FIFO · enqueue / dequeue</span>
                </button>
                <button class="structure-card" type="button" data-key="array">
                    <span class="structure-name">Array</span>
                    <span class="structure-summary">Index · set / insert / erase</span>
                </button>
                <button class="structure-card" type="button" data-key="list">
                    <span class="structure-name">Linked List</span>
                    <span class="structure-summary">Node · insert / remove</span>
                </button>
                <button class="structure-card" type="button" data-key="tree">
                    <span class="structure-name">Tree</span>
                    <span class="structure-summary">Parent-Child · traversal</span>
                </button>
            </aside>

            <section class="detail-panel" aria-live="polite">
                <div class="detail-header">
                    <div>
                        <p class="panel-label" id="categoryLabel">Linear Structure</p>
                        <h2 id="detailTitle">Stack</h2>
                    </div>
                    <span class="difficulty-badge" id="difficultyBadge">Basic</span>
                </div>

                <p class="detail-description" id="detailDescription"></p>

                <div class="info-grid">
                    <article class="info-card">
                        <h3>핵심 개념</h3>
                        <p id="conceptText"></p>
                    </article>
                    <article class="info-card">
                        <h3>대표 연산</h3>
                        <ul id="operationList"></ul>
                    </article>
                    <article class="info-card">
                        <h3>시간복잡도</h3>
                        <ul id="complexityList"></ul>
                    </article>
                </div>

                <div class="preview-box">
                    <h3>시각화에서 확인할 것</h3>
                    <p id="previewText"></p>
                </div>

                <div class="action-row">
                    <a class="primary-link" id="openVisualizerLink" href="stack.html">시각화 열기</a>
                    <a class="secondary-link" href="adt-visualizer.html">코드 기반 시각화 보기</a>
                </div>
            </section>
        </section>
    </main>

    <script src="stl.js"></script>
</body>
</html>
